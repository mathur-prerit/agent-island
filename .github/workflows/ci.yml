name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Self-test
        run: swift run AgentIslandSelfTest
